name: Angular app worlflow
on:
  push:
    branches: [ main ]

jobs:
  build-angular-app:
   runs-on: ubuntu-latest

   steps:
    - uses: actions/checkout@v6.0.2
    - name: Setup node js
      uses: actions/setup-node@v6.4.0
      with:
       node-version: 12.x
    - name: Install dependencies
      run: npm install
    - name: build angualr app
      run: npm run build
   
      
    
